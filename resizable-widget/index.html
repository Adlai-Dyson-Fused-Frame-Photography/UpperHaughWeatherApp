<!DOCTYPE html>
<html lang="en" class="h-full w-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upper Haugh Weather</title>
  
  <!-- Custom Favicon for SEO / Title bar -->
  <link rel="icon" type="image/png" href="https://cdn-eu.fusedframe.co.uk/services/upperhaugh-weather-app/logos/squarefavicon-transparent.png">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              bg: '#1e374d',
              accent: '#94fdf8',
              text: '#e5e7eb',
              muted: '#9ca3af',
              dark: '#112230',
              glass: 'rgba(30, 55, 77, 0.75)'
            }
          }
        }
      }
    }
  </script>
  
  <!-- Google Fonts for premium design readability -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #1e374d;
    }

    /* Custom scrollbar for small kiosk/containers if details overflow */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(30, 55, 77, 0.5);
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #94fdf8;
      border-radius: 2px;
    }

    /* GENERAL ROTATION & FLOATING ANIMATIONS */
    @keyframes slow-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes pulse-gentle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .animate-slow-spin {
      animation: slow-spin 20s linear infinite;
    }
    .animate-float {
      animation: float 4s ease-in-out infinite;
    }
    .animate-pulse-gentle {
      animation: pulse-gentle 2s ease-in-out infinite;
    }

    /* -----------------------------------------
       BOUNCE-FREE CONTAINER SENSITIVE LAYOUTS
       (Using native CSS Container Queries)
       ----------------------------------------- */
    
    /* Define Container Type on the outer wrapper */
    #widget-container {
      container-type: size;
      container-name: widget;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
    }

    /* 1. MINI LAYOUT Profile (< 280px wide OR < 280px tall) */
    @container widget (max-width: 279px) or widget (max-height: 279px) {
      #metrics-grid {
        display: none !important;
      }
      #outlook-section {
        display: none !important;
      }
      #location-name {
        font-size: 1rem !important;
      }
      #current-temp {
        font-size: 2.75rem !important;
        line-height: 1 !important;
      }
      #weather-icon {
        width: 54px !important;
        height: 54px !important;
      }
      #condition-main {
        font-size: 0.875rem !important;
      }
      #condition-desc {
        display: none !important;
      }
    }

    /* 2. WIDE & SHORT LAYOUT Profile (Height is small, but width is wide) */
    @container widget (max-height: 279px) and (min-width: 400px) {
      #weather-widget {
        flex-direction: row !important;
        align-items: center !important;
        gap: 1.5rem !important;
        padding: 1.25rem !important;
      }
      #metrics-grid {
        display: none !important;
      }
      #outlook-section {
        display: flex !important;
        border-top: none !important;
        border-left: 1px solid rgba(148, 253, 248, 0.15) !important;
        padding-top: 0 !important;
        padding-left: 1.5rem !important;
        margin-top: 0 !important;
        height: 100% !important;
        width: 50% !important;
        justify-content: center !important;
      }
      #main-content {
        width: 50% !important;
        flex-grow: 1 !important;
        margin: 0 !important;
      }
      #location-name {
        font-size: 1.125rem !important;
      }
      #current-temp {
        font-size: 3.5rem !important;
      }
      #weather-icon {
        width: 72px !important;
        height: 72px !important;
      }
    }

    /* 3. TALL & NARROW Profile (Optimized for Portrait Kiosks) */
    @container widget (max-width: 449px) and (min-height: 280px) {
      #weather-widget {
        padding: 1.25rem !important;
      }
      #metrics-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        gap: 0.5rem !important;
        margin-top: 0.75rem !important;
        margin-bottom: 0.75rem !important;
      }
      #outlook-section {
        display: flex !important;
        margin-top: 0.75rem !important;
        padding-top: 0.75rem !important;
      }
    }

  </style>
</head>
<body class="h-full w-full overflow-hidden select-none text-brand-text bg-brand-bg flex items-center justify-center">

  <!-- THE CONTAINER WRAPPER -->
  <div id="widget-container" class="w-full h-full">

    <!-- THE DYNAMIC WEATHER WIDGET -->
    <div id="weather-widget" class="w-full h-full bg-brand-bg p-6 flex flex-col justify-between overflow-hidden relative transition-all duration-200">
      
      <!-- Ambient backdrops for high-end styling -->
      <div class="absolute -top-24 -right-24 w-48 h-48 bg-brand-accent/15 rounded-full blur-3xl pointer-events-none"></div>

            <svg class="w-5 h-5 text-brand-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>

            </svg>

          </h2>
        </div>
      </div>

      <!-- Middle Core Weather Row -->
      <div id="main-content" class="flex items-center justify-between my-3 w-full relative z-10 flex-grow min-h-0">

        <div class="flex flex-col">

            <span id="current-temp" class="text-5xl md:text-6xl lg:text-7xl font-black text-brand-text tracking-tighter">--</span>
            <span class="text-2xl md:text-3xl lg:text-4xl font-extrabold text-brand-accent">°C</span>
          </div>
          <div class="flex flex-col mt-0.5">
            <span id="condition-main" class="text-base md:text-xl font-bold text-brand-accent capitalize leading-tight">--</span>
            <span id="condition-desc" class="text-xs md:text-sm text-brand-muted capitalize tracking-wide font-medium leading-none mt-0.5">--</span>
          </div>
        </div>

        <!-- Responsive Weather Icon -->
        <div id="weather-icon" class="weather-icon-wrapper w-20 h-20 md:w-28 md:h-28 flex items-center justify-center text-brand-accent shrink-0 animate-float">

              </svg>`,
      "50d": `<svg class="w-full h-full" fill="none" stroke="#94fdf8" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5m-16.5 3h16.5m-13.5 3h10.5m-13.5-9h16.5m-16.5-3h16.5" />
              </svg>`
    };

    const DEFAULT_ICON = `<svg class="w-full h-full" fill="none" stroke="#94fdf8" stroke-width="1.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707-.707" />
                          </svg>`;

    // --- STREAMING_CHUNK: Referencing element nodes... ---
    const tempEl = document.getElementById('current-temp');
    const conditionMainEl = document.getElementById('condition-main');
    const conditionDescEl = document.getElementById('condition-desc');
    const iconEl = document.getElementById('weather-icon');
    const feelsLikeEl = document.getElementById('feels-like');
    const windSpeedEl = document.getElementById('wind-speed');
    const humidityEl = document.getElementById('humidity');
    const uvIndexEl = document.getElementById('uv-index');
    const outlookSummaryEl = document.getElementById('outlook-summary');
    const tempRangeEl = document.getElementById('temp-range');
    const errorToast = document.getElementById('error-toast');
    const errorMessage = document.getElementById('error-message');

    // --- STREAMING_CHUNK: Error logging routines... ---
    function showErrorToast(msg) {
      errorMessage.textContent = msg;
      errorToast.classList.remove('translate-y-24', 'opacity-0');
      errorToast.classList.add('translate-y-0', 'opacity-100');
      
      setTimeout(() => {
        errorToast.classList.add('translate-y-24', 'opacity-0');
        errorToast.classList.remove('translate-y-0', 'opacity-100');
      }, 7000);
    }

    // --- STREAMING_CHUNK: English Grammar Formatter... ---
    function cleanGrammar(summary) {
      if (!summary) return "";
      let clean = summary.trim();
      
      // Fixes translation patterns like "There will be partly cloudy today" into "It will be partly cloudy today"
      // while correctly leaving "There will be rain today" untouched.
      if (/^There will be\s+(partly\s+|mostly\s+)?(cloudy|sunny|clear|overcast|windy|rainy|snowy|foggy|misty|hazy)/i.test(clean)) {
        clean = clean.replace(/^There will be/i, 'It will be');
      }
      
      return clean.charAt(0).toUpperCase() + clean.slice(1);
    }

    // --- STREAMING_CHUNK: Fetching live API weather info... ---
    async function fetchWeather(backoffTime = 1000) {
      try {
        const response = await fetch(API_URL);
        if (!response.ok) {
          throw new Error(`HTTP status error: ${response.status}`);
        }
        
        const data = await response.json();
        
        if (!data || !data.weather) {
          throw new Error("Incorrect JSON weather format returned.");
        }

        failStreak = 0;
        updateWidget(data.weather);

      } catch (err) {
        failStreak++;
        console.error("Connection error on weather feed: ", err);

        // Exponential backoff recovery (Up to 5 attempts)
        if (failStreak <= 5) {
          const nextRetry = backoffTime * 2;
          setTimeout(() => fetchWeather(nextRetry), backoffTime);
        } else {
          showErrorToast("Could not fetch current weather updates. Reconnecting...");
        }
      }
    }

    // --- STREAMING_CHUNK: Processing weather metrics... ---
    function updateWidget(weatherData) {
      const current = weatherData.current;
      const todayDaily = weatherData.daily?.[0];

      if (!current) return;

      // Current temperature
      tempEl.textContent = Math.round(current.temp);

      // Current Conditions
      const mainCondition = current.weather?.[0]?.main || "Clouds";
      const conditionDesc = current.weather?.[0]?.description || "Overcast clouds";
      conditionMainEl.textContent = mainCondition;
      conditionDescEl.textContent = conditionDesc;

      // Assign custom SVG weather icon
      const iconCode = current.weather?.[0]?.icon;
      const matchingIcon = WEATHER_ICONS[iconCode] || WEATHER_ICONS[iconCode.substring(0, 2) + 'd'] || DEFAULT_ICON;
      iconEl.innerHTML = matchingIcon;

      // Detail metrics
      feelsLikeEl.textContent = `${Math.round(current.feels_like)}°C`;
      windSpeedEl.textContent = `${Math.round(current.wind_speed * 2.237)} mph`;
      humidityEl.textContent = `${current.humidity}%`;
      uvIndexEl.textContent = current.uvi !== undefined ? current.uvi : '--';

      // Daily Outlook with clean grammar parsing
      if (todayDaily) {
        const rawSummary = todayDaily.summary || `Expect ${todayDaily.weather?.[0]?.description || 'similar conditions'} throughout the day.`;
        outlookSummaryEl.textContent = cleanGrammar(rawSummary);
        
        const maxTemp = Math.round(todayDaily.temp.max);
        const minTemp = Math.round(todayDaily.temp.min);
        tempRangeEl.textContent = `H: ${maxTemp}°C  L: ${minTemp}°C`;
      } else {
        outlookSummaryEl.textContent = "Expect continuing meteorological outlook in Upper Haugh today.";
        tempRangeEl.textContent = '--';
      }
    }

    // --- STREAMING_CHUNK: Launching refresh loops... ---
    window.onload = function() {
      fetchWeather();

      // Trigger standard background refresh process (2 minutes)
      updateTimer = setInterval(() => {
        fetchWeather();
      }, REFRESH_INTERVAL);
    };

    window.onunload = function() {
      if (updateTimer) clearInterval(updateTimer);
    };
  </script>
</body>
</html>
